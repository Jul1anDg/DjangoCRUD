<!DOCTYPE html>
<html lang="en" style="height: 100%;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body style="background-color: #020617; color: #f8fafc; min-height: 100%; display: flex; flex-direction: column; font-family: system-ui, -apple-system, sans-serif;">

    <header>
        <nav class="navbar navbar-expand-lg border-bottom" style="background-color: rgba(2, 6, 23, 0.8); border-color: #1e293b !important; backdrop-filter: blur(10px);">
            <div class="container-fluid px-4">
                
                <a class="navbar-brand fw-black tracking-tight text-white d-flex align-items-center gap-2" href="/" style="font-weight: 900; letter-spacing: -0.05em;">
                    <span class="d-inline-flex align-items-center justify-content-center rounded bg-success text-dark fw-bold" style="width: 24px; height: 24px; background-color: #34d399 !important;">✓</span>
                    Task<span style="color: #34d399;">App</span>
                </a>

                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarTogglerDemo03" aria-controls="navbarTogglerDemo03" aria-expanded="false"
                    aria-label="Toggle navigation" style="filter: invert(1);">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarTogglerDemo03">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-2 align-items-center">
                        <li class="nav-item">
                            <a class="nav-link text-white-50" style="transition: color 0.2s;" onmouseover="this.style.color='#34d399'" onmouseout="this.style.color='rgba(255,255,255,0.5)'" href="/">Home</a>
                        </li>
                        
                        {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link text-white-50" style="transition: color 0.2s;" onmouseover="this.style.color='#34d399'" onmouseout="this.style.color='rgba(255,255,255,0.5)'" href="/tasks/">Tareas</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-sm btn-outline-danger px-3 rounded-pill ms-lg-2" href="/logout/">Cerrar Sesión</a>
                        </li>
                        {% else %}
                        <li class="nav-item">
                            <a class="nav-link text-white-50" style="transition: color 0.2s;" onmouseover="this.style.color='#34d399'" onmouseout="this.style.color='rgba(255,255,255,0.5)'" href="/signIn/">Iniciar Sesión</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-sm px-3 rounded-pill ms-lg-2 fw-bold" style="background-color: #34d399; color: #020617; border: none;" href="/signUp/">Registrarse</a>
                        </li>
                        {% endif %}
                    </ul>

                    <form class="d-flex ms-lg-4 mt-3 mt-lg-0" role="search">
                        <input class="form-control me-2 border-0 bg-dark text-white rounded-3 placeholder-glow" type="search" placeholder="Buscar..." aria-label="Search" style="background-color: #0f172a !important; color: #fff;" />
                        <button class="btn btn-outline-success px-3 rounded-3" type="submit" style="color: #34d399; border-color: #34d399;">
                            <i class="bi bi-search"></i>
                        </button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="border-t py-4 mt-auto text-center" style="border-top: 1px solid #1e293b; background-color: #020617;">
        <div class="container text-secondary" style="font-size: 0.85rem;">
            <p class="mb-0">&copy; 2026 Task Manager. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
